<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — The Random Store</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="navbar">
    <a href="index.html" class="logo">THE RANDOM STORE</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html" class="cart-link active">
        Cart <span class="cart-count" id="cart-count">0</span>
      </a>
    </nav>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </header>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart (<span id="cart-count-mobile">0</span>)</a>
  </div>

  <section class="page-header">
    <h1>Your Cart</h1>
  </section>

  <section class="section cart-layout">
    <div class="cart-items" id="cart-items"></div>
    <aside class="cart-summary" id="cart-summary"></aside>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <span class="logo">THE RANDOM STORE</span>
      <p>© 2026 The Random Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    renderCart();
    updateCartCount();
  </script>
</body>
</html>
